name: CosmiqCompanion
options:
  bundleIdPrefix: com.pbouffaut
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

packages:
  CosmiqKit:
    path: CosmiqKit

targets:
  CosmiqCompanion:
    type: application
    platform: iOS
    sources:
      - App/Sources
    dependencies:
      - package: CosmiqKit
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: CosmiQ Companion
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSBluetoothAlwaysUsageDescription: >-
          CosmiQ Companion talks to your COSMIQ+ dive computer over Bluetooth
          to change its settings and download your dive logs.
        UIFileSharingEnabled: true
        LSSupportsOpeningDocumentsInPlace: true
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        MARKETING_VERSION: 1.0.0
        CURRENT_PROJECT_VERSION: 1
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: false
        ENABLE_USER_SCRIPT_SANDBOXING: true
